<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🎙️ Voiceover Studio</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 900px;
            margin: 0 auto;
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            padding: 40px;
        }

        h1 {
            color: #333;
            margin-bottom: 10px;
            font-size: 2.5em;
        }

        .subtitle {
            color: #666;
            margin-bottom: 30px;
            font-size: 1.1em;
        }

        .upload-area {
            border: 3px dashed #667eea;
            border-radius: 15px;
            padding: 60px 20px;
            text-align: center;
            background: #f8f9ff;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-bottom: 30px;
        }

        .upload-area:hover {
            border-color: #764ba2;
            background: #f0f2ff;
        }

        .upload-area.dragover {
            border-color: #764ba2;
            background: #e8ebff;
            transform: scale(1.02);
        }

        .upload-icon {
            font-size: 4em;
            color: #667eea;
            margin-bottom: 20px;
        }

        .upload-text {
            font-size: 1.2em;
            color: #333;
            margin-bottom: 10px;
        }

        .upload-subtext {
            color: #666;
            font-size: 0.9em;
        }

        input[type="file"] {
            display: none;
        }

        .options-section {
            display: none;
            margin-top: 30px;
        }

        .options-section.visible {
            display: block;
        }

        .option-group {
            margin-bottom: 25px;
        }

        .option-group label {
            display: block;
            margin-bottom: 8px;
            color: #333;
            font-weight: 600;
        }

        select {
            width: 100%;
            padding: 12px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 1em;
            background: white;
            cursor: pointer;
            transition: border-color 0.3s;
        }

        select:focus {
            outline: none;
            border-color: #667eea;
        }

        .btn {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 15px 40px;
            border-radius: 10px;
            font-size: 1.1em;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
            width: 100%;
            margin-top: 20px;
        }

        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 25px rgba(102, 126, 234, 0.4);
        }

        .btn:active {
            transform: translateY(0);
        }

        .btn:disabled {
            background: #ccc;
            cursor: not-allowed;
            transform: none;
        }

        .progress-section {
            display: none;
            margin-top: 30px;
        }

        .progress-section.visible {
            display: block;
        }

        .progress-bar {
            width: 100%;
            height: 8px;
            background: #e0e0e0;
            border-radius: 10px;
            overflow: hidden;
            margin-bottom: 15px;
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #667eea 0%, #764ba2 100%);
            width: 0%;
            transition: width 0.3s ease;
            animation: pulse 1.5s infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.7; }
        }

        .status-text {
            text-align: center;
            color: #666;
            font-size: 1.1em;
            margin-bottom: 10px;
        }

        .result-section {
            display: none;
            margin-top: 30px;
            padding: 25px;
            background: #f8f9ff;
            border-radius: 15px;
        }

        .result-section.visible {
            display: block;
        }

        .transcription-box {
            background: white;
            padding: 20px;
            border-radius: 10px;
            border: 2px solid #e0e0e0;
            margin-bottom: 20px;
            max-height: 200px;
            overflow-y: auto;
        }

        .transcription-title {
            font-weight: 600;
            color: #333;
            margin-bottom: 10px;
        }

        .transcription-text {
            color: #666;
            line-height: 1.6;
        }

        .download-btn {
            background: #4caf50;
            text-decoration: none;
            display: inline-block;
            text-align: center;
        }

        .download-btn:hover {
            box-shadow: 0 10px 25px rgba(76, 175, 80, 0.4);
        }

        .file-info {
            background: #fff;
            padding: 15px;
            border-radius: 10px;
            margin-bottom: 20px;
            border: 2px solid #e0e0e0;
        }

        .file-name {
            font-weight: 600;
            color: #333;
            margin-bottom: 5px;
        }

        .file-size {
            color: #666;
            font-size: 0.9em;
        }

        .error-message {
            background: #fee;
            color: #c33;
            padding: 15px;
            border-radius: 10px;
            margin-top: 20px;
            border: 2px solid #fcc;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🎬 Voice Replacement Tool</h1>
        <p class="subtitle">Upload a video or audio file, and we'll transcribe it and replace the voice</p>

        <div class="upload-area" id="uploadArea">
            <div class="upload-icon">📁</div>
            <div class="upload-text">Click to upload or drag and drop</div>
            <div class="upload-subtext">Supports: MP4, AVI, MOV, MKV, MP3, WAV, M4A, FLAC (Max 500MB)</div>
            <input type="file" id="fileInput" accept="video/*,audio/*">
        </div>

        <div class="file-info" id="fileInfo" style="display: none;">
            <div class="file-name" id="fileName"></div>
            <div class="file-size" id="fileSize"></div>
        </div>

        <div class="options-section" id="optionsSection">
            <div class="option-group">
                <label for="transcriptionMethod">Transcription Method:</label>
                <select id="transcriptionMethod">
                    <option value="whisper">Local Whisper (Free, slower)</option>
                    <option value="openai">OpenAI API (Fast, requires API key)</option>
                </select>
            </div>

            <div class="option-group">
                <label for="voiceMethod">Voice Synthesis:</label>
                <select id="voiceMethod">
                    <option value="openai">OpenAI TTS (Requires API key)</option>
                    <option value="elevenlabs">ElevenLabs (Requires API key)</option>
                </select>
            </div>

            <div class="option-group">
                <label for="voice">Voice:</label>
                <select id="voice">
                    <option value="alloy">Alloy (Neutral, balanced)</option>
                    <option value="echo">Echo (Male, clear)</option>
                    <option value="fable">Fable (British accent, expressive)</option>
                    <option value="onyx">Onyx (Deep male)</option>
                    <option value="nova">Nova (Female, energetic)</option>
                    <option value="shimmer">Shimmer (Female, soft)</option>
                </select>
            </div>

            <button class="btn" id="processBtn">Process Video</button>
        </div>

        <div class="progress-section" id="progressSection">
            <div class="progress-bar">
                <div class="progress-fill" id="progressFill"></div>
            </div>
            <div class="status-text" id="statusText">Processing...</div>
        </div>

        <div class="result-section" id="resultSection">
            <div class="transcription-box">
                <div class="transcription-title">Transcription:</div>
                <div class="transcription-text" id="transcriptionText"></div>
            </div>
            <a href="#" class="btn download-btn" id="downloadBtn">Download Result</a>
        </div>

        <div class="error-message" id="errorMessage" style="display: none;"></div>
    </div>

    <script>
        let currentJobId = null;
        let uploadedFile = null;

        const uploadArea = document.getElementById('uploadArea');
        const fileInput = document.getElementById('fileInput');
        const fileInfo = document.getElementById('fileInfo');
        const fileName = document.getElementById('fileName');
        const fileSize = document.getElementById('fileSize');
        const optionsSection = document.getElementById('optionsSection');
        const processBtn = document.getElementById('processBtn');
        const progressSection = document.getElementById('progressSection');
        const resultSection = document.getElementById('resultSection');
        const errorMessage = document.getElementById('errorMessage');
        const statusText = document.getElementById('statusText');
        const transcriptionText = document.getElementById('transcriptionText');
        const downloadBtn = document.getElementById('downloadBtn');

        // Upload area click
        uploadArea.addEventListener('click', () => {
            fileInput.click();
        });

        // Drag and drop
        uploadArea.addEventListener('dragover', (e) => {
            e.preventDefault();
            uploadArea.classList.add('dragover');
        });

        uploadArea.addEventListener('dragleave', () => {
            uploadArea.classList.remove('dragover');
        });

        uploadArea.addEventListener('drop', (e) => {
            e.preventDefault();
            uploadArea.classList.remove('dragover');

            if (e.dataTransfer.files.length > 0) {
                handleFileSelect(e.dataTransfer.files[0]);
            }
        });

        // File input change
        fileInput.addEventListener('change', (e) => {
            if (e.target.files.length > 0) {
                handleFileSelect(e.target.files[0]);
            }
        });

        function handleFileSelect(file) {
            uploadedFile = file;

            // Show file info
            fileName.textContent = file.name;
            fileSize.textContent = formatFileSize(file.size);
            fileInfo.style.display = 'block';

            // Upload file
            uploadFile(file);
        }

        function formatFileSize(bytes) {
            if (bytes === 0) return '0 Bytes';
            const k = 1024;
            const sizes = ['Bytes', 'KB', 'MB', 'GB'];
            const i = Math.floor(Math.log(bytes) / Math.log(k));
            return Math.round(bytes / Math.pow(k, i) * 100) / 100 + ' ' + sizes[i];
        }

        async function uploadFile(file) {
            const formData = new FormData();
            formData.append('file', file);

            try {
                const response = await fetch('/upload', {
                    method: 'POST',
                    body: formData
                });

                const data = await response.json();

                if (data.success) {
                    currentJobId = data.job_id;
                    optionsSection.classList.add('visible');
                    hideError();
                } else {
                    showError(data.error || 'Upload failed');
                }
            } catch (error) {
                showError('Upload failed: ' + error.message);
            }
        }

        processBtn.addEventListener('click', async () => {
            if (!currentJobId) {
                showError('Please upload a file first');
                return;
            }

            // Hide options and result, show progress
            optionsSection.classList.remove('visible');
            resultSection.classList.remove('visible');
            progressSection.classList.add('visible');
            hideError();

            const transcriptionMethod = document.getElementById('transcriptionMethod').value;
            const voiceMethod = document.getElementById('voiceMethod').value;
            const voice = document.getElementById('voice').value;

            try {
                statusText.textContent = 'Processing your file...';
                document.getElementById('progressFill').style.width = '50%';

                const response = await fetch('/process', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        job_id: currentJobId,
                        transcription_method: transcriptionMethod,
                        voice_method: voiceMethod,
                        voice: voice
                    })
                });

                const data = await response.json();

                if (data.success) {
                    document.getElementById('progressFill').style.width = '100%';
                    statusText.textContent = 'Complete!';

                    setTimeout(() => {
                        progressSection.classList.remove('visible');
                        resultSection.classList.add('visible');

                        transcriptionText.textContent = data.transcription;
                        downloadBtn.href = data.download_url;
                    }, 500);
                } else {
                    progressSection.classList.remove('visible');
                    showError(data.error || 'Processing failed');
                }
            } catch (error) {
                progressSection.classList.remove('visible');
                showError('Processing failed: ' + error.message);
            }
        });

        function showError(message) {
            errorMessage.textContent = message;
            errorMessage.style.display = 'block';
        }

        function hideError() {
            errorMessage.style.display = 'none';
        }
    </script>
</body>
</html>
